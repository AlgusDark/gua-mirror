name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      - run: go mod download
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      # v9 bumps the action's runtime to node24; it requires
      # golangci-lint v2.1.0 or later, which `version: latest`
      # satisfies. v2 removed the default 1m timeout (now unbounded),
      # so --timeout=5m is a defensive cap rather than a workaround.
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
